<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabZero | Future of Online Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            gridTemplateColumns: {
              '18': 'repeat(18, minmax(0, 1fr))',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --glass: rgba(15, 23, 42, 0.7);
        --border: rgba(255, 255, 255, 0.08);
        --bg-body: #030712;
        --text-color: #f8fafc;
      }
      body {
        background-color: var(--bg-body);
        color: var(--text-color);
        font-family: 'Inter', sans-serif;
        overflow-x: hidden;
        transition: background-color 0.4s ease, color 0.4s ease;
      }

      /* Light Mode Overrides */
      .light-mode {
        --glass: rgba(255, 255, 255, 0.8);
        --border: rgba(15, 23, 42, 0.08);
        --bg-body: #f1f5f9;
        --text-color: #0f172a;
      }
      .light-mode .text-white { color: #0f172a !important; }
      .light-mode .text-white\/90 { color: #1e293b !important; }
      .light-mode .text-white\/60 { color: #475569 !important; }
      .light-mode .text-white\/50 { color: #64748b !important; }
      .light-mode .text-white\/40 { color: rgba(15, 23, 42, 0.5) !important; }
      .light-mode .text-white\/30 { color: rgba(15, 23, 42, 0.3) !important; }
      .light-mode .text-white\/20 { color: rgba(15, 23, 42, 0.2) !important; }
      .light-mode .text-white\/10 { color: rgba(15, 23, 42, 0.1) !important; }
      .light-mode .text-white\/5 { color: rgba(15, 23, 42, 0.05) !important; }
      
      .light-mode .bg-slate-950, .light-mode .bg-\[\#020617\] { background-color: #f8fafc !important; }
      .light-mode .bg-slate-950\/80 { background-color: rgba(255, 255, 255, 0.8) !important; }
      .light-mode .bg-slate-950\/50 { background-color: rgba(241, 245, 249, 0.5) !important; }
      .light-mode .bg-slate-950\/40 { background-color: rgba(241, 245, 249, 0.4) !important; }
      .light-mode .bg-slate-950\/20 { background-color: rgba(241, 245, 249, 0.2) !important; }
      
      .light-mode .bg-white\/5 { background-color: rgba(15, 23, 42, 0.05) !important; }
      .light-mode .bg-white\/15 { background-color: rgba(15, 23, 42, 0.1) !important; }
      .light-mode .bg-slate-900\/30, .light-mode .bg-slate-900\/40, .light-mode .bg-slate-900\/50, .light-mode .bg-slate-900\/60, .light-mode .bg-slate-900\/80 { 
        background-color: rgba(0, 0, 0, 0.04) !important; 
      }
      .light-mode .bg-black\/40, .light-mode .bg-black\/60 { background-color: rgba(255, 255, 255, 0.7) !important; }

      .light-mode .border-white\/5, .light-mode .border-white\/10 { border-color: rgba(15, 23, 42, 0.08) !important; }
      .light-mode .glass-panel { background: var(--glass) !important; border-color: var(--border) !important; }
      .light-mode .shadow-inner { box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06) !important; }
      .light-mode .bg-indigo-600\/5 { background-color: rgba(79, 70, 229, 0.05) !important; }

      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(99, 102, 241, 0.2);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(99, 102, 241, 0.4);
      }
      .glass-panel {
        background: var(--glass);
        backdrop-filter: blur(16px);
        border: 1px solid var(--border);
        transition: background 0.4s ease, border-color 0.4s ease;
      }
      .neon-glow {
        box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
      }
      .quantum-bg {
        background-image: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.05) 0%, transparent 70%);
      }

      /* Prose Styles for Markdown */
      .prose {
        color: #94a3b8;
        max-width: 65ch;
      }

      .prose h1 {
        color: #f8fafc;
        font-weight: 900;
        font-size: 2.25rem;
        margin-top: 0;
        margin-bottom: 2rem;
        letter-spacing: -0.05em;
        text-transform: uppercase;
        font-style: italic;
      }

      .prose h2 {
        color: #f8fafc;
        font-weight: 800;
        font-size: 1.5rem;
        margin-top: 3rem;
        margin-bottom: 1.5rem;
        letter-spacing: -0.02em;
      }

      .prose p {
        margin-top: 1.25rem;
        margin-bottom: 1.25rem;
        line-height: 1.75;
      }

      .prose strong {
        color: #818cf8;
        font-weight: 700;
      }

      .prose ul {
        margin-top: 1.25rem;
        margin-bottom: 1.25rem;
        list-style-type: disc;
        padding-left: 1.625rem;
      }

      .prose li {
        margin-top: 0.5rem;
        margin-bottom: 0.5rem;
      }

      .prose code {
        color: #818cf8;
        background-color: rgba(129, 140, 248, 0.1);
        padding: 0.2rem 0.4rem;
        border-radius: 0.375rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 0.875em;
      }
    </style>
<script type="importmap">

    "react": "https://esm.sh/react@^19.2.3",

  }
}
</script>
</head>

<script type="module" src="/src/index.tsx"></script>
</body>
</html>
